<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">fac<span>et</span></div>
    <span id="result-count"></span>
  </header>

  <div class="layout">

    <aside class="sidebar">

      <div class="filter-group">
        <label for="search-input">Search</label>
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search products…" />
        </div>
      </div>

      <div class="filter-group">
        <label for="category-select">Category</label>
        <select id="category-select">
          <option value="all">All categories</option>
          <option value="electronics">Electronics</option>
          <option value="gear">Gear</option>
          <option value="clothing">Clothing</option>
          <option value="home">Home</option>
          <option value="fitness">Fitness</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Max price</label>
        <div class="range-wrap">
          <div class="range-label-row">
            <span style="font-size:12px;color:var(--text-muted)">$0</span>
            <span class="range-value" id="price-display">$1,500</span>
          </div>
          <input type="range" id="price-range" min="0" max="1500" step="10" />
        </div>
      </div>

      <div class="filter-group">
        <label>Min rating</label>
        <div class="range-wrap">
          <div class="range-label-row">
            <span style="font-size:12px;color:var(--text-muted)">Any</span>
            <span class="range-value" id="rating-display">Any</span>
          </div>
          <input type="range" id="rating-range" min="0" max="5" step="0.5" value="0" />
        </div>
      </div>

      <button class="reset-btn" onclick="resetFilters()">Reset filters</button>

    </aside>

    <main class="grid-area">
      <div class="sort-bar">
        <label for="sort-select">Sort by</label>
        <select id="sort-select">
          <option value="default">Default</option>
          <option value="price-asc">Price: low → high</option>
          <option value="price-desc">Price: high → low</option>
          <option value="name-asc">Name: A → Z</option>
          <option value="name-desc">Name: Z → A</option>
          <option value="rating">Top rated</option>
        </select>
      </div>

      <div id="product-grid"></div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
